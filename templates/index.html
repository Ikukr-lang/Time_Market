<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Маркетплейс записи</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="main-menu" class="screen">
    <h1>Маркетплейс</h1>
    <button class="big-btn support" onclick="showSupport()">Поддержка</button>
    <button class="big-btn create" onclick="startCreateCompany()">Создать компанию</button>
  </div>

  <!-- Экран создания компании -->
  <div id="create-screen" class="screen hidden">
    <h2>Создание компании</h2>
    <!-- шаги будут переключаться через JS -->
    <div id="step-content"></div>
  </div>

  <!-- Админ-панель -->
  <div id="admin-screen" class="screen hidden">
    <h2>Админ-панель</h2>
    <div id="admin-content"></div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
